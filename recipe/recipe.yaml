schema_version: 1

context:
  name: azure-mgmt-applicationinsights
  version: 1.0.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/azure-mgmt-applicationinsights-${{ version }}.zip
  sha256: c287a2c7def4de19f92c0c31ba02867fac6f5b8df71b5dbdab19288bb455fc5b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - setuptools
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - azure-common >=1.1,<2.0
    - azure-mgmt-core >=1.2.0,<2.0.0
    - msrest >=0.5.0

tests:
  - python:
      imports:
        - azure.mgmt.applicationinsights
        - azure.mgmt.applicationinsights.aio
      pip_check: true
      python_version: ${{ python_min }}.*
about:
  summary: Microsoft Azure Application Insights Management Client Library for Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
